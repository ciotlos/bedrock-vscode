name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version matches tag (tag push only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG="${TAG_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG)"; exit 1;
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package -o bedrock-vscode.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: bedrock-vscode.vsix

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set outputs
        id: set_outputs
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_pr: ${{ steps.set_outputs.outputs.is_pr }}
      pr_number: ${{ steps.set_outputs.outputs.pr_number }}
      pr_title: ${{ steps.set_outputs.outputs.pr_title }}

  publish:
    runs-on: ubuntu-latest
    needs: [package]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --pat ${{ secrets.MARKETPLACE_TOKEN }} --packagePath ./bedrock-vscode.vsix

  release:
    runs-on: ubuntu-latest
    needs: [package]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Create GitHub Release (tag push)
        if: needs.package.outputs.is_pr == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ needs.package.outputs.version }} \
            ./bedrock-vscode.vsix \
            --title "v${{ needs.package.outputs.version }}" \
            --generate-notes

      - name: Create GitHub Release (PR merge)
        if: needs.package.outputs.is_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ needs.package.outputs.version }}-pr${{ needs.package.outputs.pr_number }} \
            ./bedrock-vscode.vsix \
            --title "v${{ needs.package.outputs.version }} (PR #${{ needs.package.outputs.pr_number }})" \
            --notes "Automated release for PR #${{ needs.package.outputs.pr_number }}: ${{ needs.package.outputs.pr_title }}"
